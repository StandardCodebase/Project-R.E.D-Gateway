<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{if .Title}}{{.Title}} – {{end}}{{.Site}}</title>
        <link rel="stylesheet" href="/static/reset.css" />
        <link rel="stylesheet" href="/static/layout.css" />
        <link rel="stylesheet" href="/static/nav.css" />
        <link rel="stylesheet" href="/static/article.css" />
    </head>
    <body>
        {{ if .Hash }}
        <div class="content-signature">
            <span class="sig-label">SHA-256:</span>
            <code class="sig-hash">{{ .Hash }}</code>
        </div>
        {{ end }} {{ .Body }}

        <header id="topbar">
            <a id="wordmark" href="/">{{.Site}}</a>
        </header>

        <div id="wrap">
            <nav id="sidebar">
                <div class="nav-heading">Topics</div>
                {{range $k, $s := .Nav}}
                <a
                    class="nav-item{{if eq $.TopCat $k}} active{{end}}"
                    href="/{{$k}}"
                    >{{$s.Name}}</a
                >
                {{end}}
                <div class="nav-section">
                    <h3 style="color: #d32f2f">SYSTEM</h3>
                    <ul>
                        <li><a href="/admin">⚙️ Operator Dashboard</a></li>
                        <li>
                            <a href="/-/reload" target="_blank"
                                >🔄 Hot Reload Node</a
                            >
                        </li>
                    </ul>
                </div>
            </nav>

            <main id="main">
                {{if .Crumb}}
                <nav class="breadcrumb">
                    <a href="/">{{.Site}}</a>
                    {{range .Crumb}}
                    <span class="sep">›</span>
                    <a href="{{.Path}}">{{.Label}}</a>
                    {{end}}
                </nav>
                {{end}}
                <article class="article">{{.Body}}</article>
            </main>
        </div>
    </body>
</html>
